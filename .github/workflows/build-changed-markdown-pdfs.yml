name: Build changed Markdown PDFs

on:
  push:
    paths:
      - "**/*.md"
  workflow_dispatch:
    inputs:
      build_all:
        description: "Build every tracked Markdown file"
        required: false
        default: "true"

permissions:
  contents: write

concurrency:
  group: markdown-pdf-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-pdfs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fontconfig \
            fonts-liberation \
            pandoc \
            texlive-fonts-recommended \
            texlive-latex-extra \
            texlive-xetex
          fc-match Arial

      - name: Build PDFs beside changed Markdown files
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          PDF_ENGINE: xelatex
          BUILD_ALL_MARKDOWN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_all == 'true' && '1' || '0' }}
        run: bash scripts/build-changed-markdown-pdfs.sh

      - name: Commit generated PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -- '*.pdf'

          if git diff --cached --quiet; then
            echo "No PDF changes to commit."
            exit 0
          fi

          git commit -m "Build PDFs for changed Markdown files"
          git push
